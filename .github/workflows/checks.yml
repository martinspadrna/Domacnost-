name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # V repo nejsou npm závislosti (package.json bez `dependencies` /
      # `devDependencies`). npm run check pouští jen dependency-free
      # Node ESM skripty v tools/, takže žádný install / cache neřešíme.
      - name: Run full check pipeline
        run: npm run check
