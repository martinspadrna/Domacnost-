name: Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      # V repo nejsou npm závislosti (package.json bez `dependencies` /
      # `devDependencies`). npm run check pouští jen dependency-free
      # Node ESM skripty v tools/, takže žádný install / cache neřešíme.
      - name: Run full check pipeline
        run: npm run check

      - name: Run browser E2E smoke
        env:
          E2E_REQUIRED: "1"
        run: npm run check:e2e
