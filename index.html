  <body>
    <div id="app" class="app-shell">
      <div class="boot-loading-card">
        <div class="brand-mark big logo-mark"><img src="./icons/domacnost-plus-icon-180.png" alt="Domácnost+" loading="eager"></div>
        <strong>Spouštím Domácnost+</strong>
        <span>Když se aplikace po aktualizaci zasekne, v dalším kroku se ukáže obnova místo bílé stránky.</span>
      </div>
      <noscript>Pro spuštění aplikace je potřeba povolit JavaScript.</noscript>
    </div>
    <script>
      (function () {
        // iOS standalone PWA při studeném startu někdy hlásí layout viewport
        // zkrácený o status bar (in=879 vs scr=926 na Pro Max) - ale malovat
        // podle něj může i nemusí (dva režimy se stejnými JS čísly). Korekce
        // podle screen.height proto v jednom režimu dock srovnala a ve druhém
        // ho usekla pod okraj - je vypnutá, dokud diagnostika CSS jednotek
        // (lvh/dvh) neukáže hodnotu sledující skutečné kreslení.
        function syncDockViewportOffset() {
          document.documentElement.style.setProperty('--mobile-dock-runtime-offset', '0px');
        }
        function syncAppViewport() {
          var height = 0;
          var bottomShift = 0;
          if (window.visualViewport && window.visualViewport.height) {
            height = window.visualViewport.height;
            bottomShift = 0;
          }
          if (!height) height = window.innerHeight || document.documentElement.clientHeight || 0;
          if (height) document.documentElement.style.setProperty('--app-vh', height + 'px');
          document.documentElement.style.setProperty('--nav-vv-shift', bottomShift + 'px');
          syncDockViewportOffset();
        }
        syncAppViewport();
        [60, 240, 720, 1400].forEach(function (delay) { window.setTimeout(syncAppViewport, delay); });
        window.addEventListener('resize', syncAppViewport, { passive: true });
        window.addEventListener('pageshow', syncAppViewport, { passive: true });
        window.addEventListener('orientationchange', function () { window.setTimeout(syncAppViewport, 180); }, { passive: true });
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', syncAppViewport, { passive: true });
          window.visualViewport.addEventListener('scroll', syncAppViewport, { passive: true });
        }

        // Pojistky pro dorovnání docku: pozdější kontroly pro pomalé studené
        // starty a re-sync při každém dotyku - iOS viewport typicky opravuje
        // právě při gestu a korekce se pak musí hned vynulovat.
        [2600, 4200].forEach(function (delay) { window.setTimeout(syncAppViewport, delay); });
        var gestureViewportSync = function () {
          syncAppViewport();
          window.setTimeout(syncAppViewport, 140);
        };
        window.addEventListener('touchstart', gestureViewportSync, { capture: true, passive: true });
        window.addEventListener('pointerdown', gestureViewportSync, { capture: true, passive: true });

        // DIAGNOSTIKA (jen build 433): kromě viewport čísel měří i CSS
        // jednotky vh/lvh/dvh/svh - ty se můžou řídit interním viewportem,
        // podle kterého iOS skutečně kreslí, zatímco innerHeight lže.
        (function () {
          var box = null;
          function unitProbe(cssHeight) {
            try {
              var el = document.createElement('div');
              el.style.cssText = 'position:absolute;left:-9999px;top:0;width:1px;height:' + cssHeight + ';';
              document.documentElement.appendChild(el);
              var h = el.getBoundingClientRect().height;
              el.parentNode.removeChild(el);
              return Math.round(h);
            } catch (e) { return -1; }
          }
          function line(tag) {
            var nav = document.querySelector('.nav-shell');
            var vv = window.visualViewport;
            return tag
              + ' in=' + window.innerHeight
              + ' scr=' + (window.screen ? window.screen.height : '-')
              + ' vv=' + (vv ? Math.round(vv.height) + '+' + Math.round(vv.offsetTop) : '-')
              + ' nav=' + (nav ? Math.round(nav.getBoundingClientRect().bottom) : '-')
              + ' vh=' + unitProbe('100vh')
              + ' lvh=' + unitProbe('100lvh')
              + ' dvh=' + unitProbe('100dvh')
              + ' svh=' + unitProbe('100svh')
              + ' st=' + (navigator.standalone === true ? 1 : 0);
          }
          function addLine(tag) {
            try {
              if (!box) {
                box = document.createElement('div');
                box.style.cssText = 'position:absolute;top:64px;left:8px;right:8px;z-index:99999;font:10px/1.6 ui-monospace,monospace;color:#8f8;background:rgba(0,0,0,.62);padding:6px 8px;border-radius:10px;pointer-events:none;white-space:pre-wrap;';
                document.body.appendChild(box);
              }
              box.textContent += line(tag) + '\n';
            } catch (e) {}
          }
          window.setTimeout(function () { addLine('433 t0.3s'); }, 300);
          window.setTimeout(function () { addLine('t1.2s'); }, 1200);
          window.setTimeout(function () { addLine('t3.9s'); }, 3900);
          var taps = 0;
          window.addEventListener('touchstart', function () {
            taps += 1;
            if (taps > 2) return;
            var n = taps;
            addLine('tap' + n);
            window.setTimeout(function () { addLine('tap' + n + '+0.3s'); }, 300);
          }, { capture: true, passive: true });
        })();
      })();
    </script>
    <script>
      window.__DOMACNOST_APP_STARTED__ = false;
      window.__DOMACNOST_BOOT_TIMEOUT__ = window.setTimeout(function () {
        var root = document.getElementById('app');
        if (window.__DOMACNOST_APP_STARTED__ || !root || !root.querySelector('.boot-loading-card')) return;
        root.innerHTML = '<div class="boot-fallback-screen"><section class="boot-fallback-card"><div class="brand-mark big logo-mark"><img src="./icons/domacnost-plus-icon-180.png" alt="Domácnost+" loading="eager"></div><span class="badge">Domácnost+ v.0.1_433</span><h1>Aplikace se nenačetla</h1><p>Vypadá to, že se po aktualizaci nespustil hlavní soubor aplikace. Nejčastěji za to může stará PWA cache v prohlížeči.</p><div class="form-actions"><button class="primary-btn" type="button" data-boot-reload>Obnovit aplikaci</button><button class="ghost-btn" type="button" data-boot-clear>Vyčistit cache a obnovit</button></div><p class="small-muted">Tahle obnova nemaže data domácnosti, čistí jen cache aplikace v prohlížeči.</p></section></div>';
        root.querySelector('[data-boot-reload]')?.addEventListener('click', function () { window.location.reload(); });
        root.querySelector('[data-boot-clear]')?.addEventListener('click', async function () {
          try {
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.filter(function (key) { return key.indexOf('domacnost-plus-') === 0; }).map(function (key) { return caches.delete(key); }));
            }
          } catch (error) {}
          window.location.reload();
        });
      }, 9000);
    </script>
